name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: |
          VERSION="$(cat VERSION)"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%d)"
          go build -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${DATE}" -o bin/vfs ./cmd/vfs

      - name: Verify binary
        run: |
          ./bin/vfs --version
          ./bin/vfs --help

      - name: Test
        run: go test ./...

      - name: Test with race detector
        run: go test -race ./...

  version-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION was bumped
        run: |
          BASE_VERSION="$(git show origin/main:VERSION 2>/dev/null | tr -d '[:space:]')" || BASE_VERSION=""
          PR_VERSION="$(cat VERSION | tr -d '[:space:]')"

          if [ -z "$BASE_VERSION" ]; then
            echo "No VERSION on main yet -- skipping check"
            exit 0
          fi

          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "::warning::VERSION file was not bumped (still ${PR_VERSION}). Remember to bump it before releasing."
          else
            echo "VERSION bumped: ${BASE_VERSION} -> ${PR_VERSION}"
          fi

  auto-tag:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and release branch if VERSION changed
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists -- skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            echo "Creating tag ${TAG}"
            git tag -a "$TAG" -m "Release ${TAG}"
            git push origin "$TAG"
            echo "Creating release branch ${TAG}"
            git checkout -b "$TAG"
            git push origin "$TAG:refs/heads/${TAG}"
            echo "Pushed tag + branch ${TAG} -- release workflow will now run"
          fi
