name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Native builds (CGO works out of the box)
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
            artifact: vfs-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang
            artifact: vfs-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
            artifact: vfs-darwin-arm64

          # Cross-compile: linux/arm64 on ubuntu amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            cross: true
            artifact: vfs-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install cross-compiler
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          LDFLAGS="-X main.version=${{ steps.version.outputs.version }}"
          go build -ldflags "$LDFLAGS" -o vfs ./cmd/vfs

      - name: Test
        if: ${{ !matrix.cross }}
        run: go test ./...

      - name: Package
        run: |
          tar czf ${{ matrix.artifact }}.tar.gz vfs
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          cat > notes.md <<EOF
          ## Install

          **Download a binary** (no Go or C compiler needed):

          \`\`\`bash
          # macOS (Apple Silicon / M1+)
          curl -L https://github.com/TrNgTien/vfs/releases/download/${TAG}/vfs-darwin-arm64.tar.gz | tar xz
          sudo mv vfs /usr/local/bin/

          # macOS (Intel)
          curl -L https://github.com/TrNgTien/vfs/releases/download/${TAG}/vfs-darwin-amd64.tar.gz | tar xz
          sudo mv vfs /usr/local/bin/

          # Linux (x86_64)
          curl -L https://github.com/TrNgTien/vfs/releases/download/${TAG}/vfs-linux-amd64.tar.gz | tar xz
          sudo mv vfs /usr/local/bin/

          # Linux (ARM64)
          curl -L https://github.com/TrNgTien/vfs/releases/download/${TAG}/vfs-linux-arm64.tar.gz | tar xz
          sudo mv vfs /usr/local/bin/

          # Auto-detect your platform
          curl -L "https://github.com/TrNgTien/vfs/releases/download/${TAG}/vfs-\$(uname -s | tr A-Z a-z)-\$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz
          sudo mv vfs /usr/local/bin/
          \`\`\`

          **Or build from source:**

          \`\`\`bash
          git clone https://github.com/TrNgTien/vfs.git && cd vfs
          go install ./cmd/vfs
          \`\`\`

          ## Verify checksums

          Each \`.tar.gz\` has a matching \`.sha256\` file. To verify:

          \`\`\`bash
          shasum -a 256 -c vfs-darwin-arm64.tar.gz.sha256
          \`\`\`
          EOF
          sed -i 's/^          //' notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "vfs $GITHUB_REF_NAME" \
            --notes-file notes.md \
            artifacts/*
