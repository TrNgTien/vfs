name: Release

on:
  push:
    branches: ["v*"]

permissions:
  contents: write

env:
  GO_VERSION: "1.24"

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cc: gcc
            artifact: vfs-linux-amd64
          - goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            cross: true
            artifact: vfs-linux-arm64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install cross-compiler
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%d)"
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${DATE}"
          go build -ldflags "$LDFLAGS" -o vfs ./cmd/vfs

      - name: Test
        if: ${{ !matrix.cross }}
        run: go test ./...

      - name: Verify binary
        if: ${{ !matrix.cross }}
        run: |
          ./vfs --version
          echo "--- smoke test ---"
          ./vfs . -f Extract | head -5

      - name: Package
        run: |
          tar czf ${{ matrix.artifact }}.tar.gz vfs
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || true)"
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from ${PREV_TAG} to ${TAG}"
            COMMITS="$(git log --oneline "${PREV_TAG}..${TAG}" --no-merges)"
          else
            echo "First release -- showing all commits"
            COMMITS="$(git log --oneline --no-merges)"
          fi
          {
            echo "## Install"
            echo ""
            echo "**Download a pre-built binary** (no Go or C compiler needed):"
            echo ""
            echo '```bash'
            echo "# Linux (x86_64)"
            echo "curl -L https://github.com/TrNgTien/vfs/releases/download/${TAG}/vfs-linux-amd64.tar.gz | tar xz"
            echo "sudo mv vfs /usr/local/bin/"
            echo ""
            echo "# Linux (ARM64)"
            echo "curl -L https://github.com/TrNgTien/vfs/releases/download/${TAG}/vfs-linux-arm64.tar.gz | tar xz"
            echo "sudo mv vfs /usr/local/bin/"
            echo '```'
            echo ""
            echo "**macOS / Windows** -- build from source:"
            echo ""
            echo '```bash'
            echo "git clone https://github.com/TrNgTien/vfs.git && cd vfs"
            echo "go install ./cmd/vfs"
            echo '```'
            echo ""
            echo "## What's changed"
            echo ""
            echo '```'
            echo "${COMMITS}"
            echo '```'
            echo ""
            echo "## Verify checksums"
            echo ""
            echo 'Each `.tar.gz` has a matching `.sha256` file:'
            echo ""
            echo '```bash'
            echo "sha256sum -c vfs-linux-amd64.tar.gz.sha256"
            echo '```'
          } > notes.md

      - name: List artifacts
        run: ls -lh artifacts/